name: Poll Service Status

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes
  workflow_dispatch:           # Allow manual trigger

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Poll all service APIs
        env:
          BETTERSTACK_TOKEN: ${{ secrets.BETTERSTACK_TOKEN }}
        run: |
          python3 << 'EOF'
          import json
          import urllib.request
          import urllib.error
          from datetime import datetime, timezone, timedelta

          # BST offset (UTC+1) — adjust to UTC+0 in winter if needed
          bst = timezone(timedelta(hours=1))
          now = datetime.now(bst).strftime('%d/%m/%Y %H:%M:%S UTC+1')

          token = "${{ env.BETTERSTACK_TOKEN }}"

          results = []

          # ── Helper: Statuspage v2 ──────────────────────────────────────────
          def fetch_statuspage(name, url, sort_key):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'TalenscioPoll/1.0'})
                  with urllib.request.urlopen(req, timeout=10) as r:
                      data = json.loads(r.read())
                  indicator = data.get('status', {}).get('indicator', 'unknown').lower()
                  description = data.get('status', {}).get('description', '')
                  incidents = data.get('incidents', [])
                  latest_issue = incidents[0].get('name', 'None') if incidents else 'None'
                  status_map = {
                      'none': 'Operational',
                      'minor': 'Degraded',
                      'major': 'Incident',
                      'critical': 'Incident',
                      'maintenance': 'Maintenance'
                  }
                  status = status_map.get(indicator, 'Unknown')
              except Exception as e:
                  status = 'Unknown'
                  description = str(e)
                  latest_issue = 'None'
              return {'service': name, 'status': status, 'description': description, 'latestIssue': latest_issue, 'lastChecked': now, 'sortKey': sort_key}

          # ── Helper: BetterStack private API ───────────────────────────────
          def fetch_betterstack(name, monitor_id, sort_key):
              try:
                  url = f'https://uptime.betterstack.com/api/v2/monitors/{monitor_id}'
                  req = urllib.request.Request(url, headers={
                      'Authorization': f'Bearer {token}',
                      'User-Agent': 'TalenscioPoll/1.0'
                  })
                  with urllib.request.urlopen(req, timeout=10) as r:
                      data = json.loads(r.read())
                  attrs = data.get('data', {}).get('attributes', {})
                  availability = attrs.get('availability', None)
                  monitor_status = attrs.get('status', 'unknown').lower()
                  status_map = {
                      'up': 'Operational',
                      'down': 'Incident',
                      'paused': 'Maintenance',
                      'pending': 'Unknown'
                  }
                  status = status_map.get(monitor_status, 'Unknown')
                  description = f"Availability: {availability}%" if availability else "All systems operational"
                  latest_issue = 'None'
              except Exception as e:
                  status = 'Unknown'
                  description = str(e)
                  latest_issue = 'None'
              return {'service': name, 'status': status, 'description': description, 'latestIssue': latest_issue, 'lastChecked': now, 'sortKey': sort_key}

          # ── Helper: SorryApp ──────────────────────────────────────────────
          def fetch_sorryapp(name, url, sort_key):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'TalenscioPoll/1.0'})
                  with urllib.request.urlopen(req, timeout=10) as r:
                      data = json.loads(r.read())
                  page = data.get('page', {})
                  status_raw = page.get('state', 'unknown').lower()
                  description = page.get('state_text', '')
                  status_map = {
                      'operational': 'Operational',
                      'degraded': 'Degraded',
                      'outage': 'Incident',
                      'incident': 'Incident',
                      'maintenance': 'Maintenance'
                  }
                  status = status_map.get(status_raw, 'Unknown')
                  latest_issue = 'None'
              except Exception as e:
                  status = 'Unknown'
                  description = str(e)
                  latest_issue = 'None'
              return {'service': name, 'status': status, 'description': description, 'latestIssue': latest_issue, 'lastChecked': now, 'sortKey': sort_key}

          # ── Helper: Talenscio Platform via BetterStack ────────────────────
          def fetch_talenscio_platform(sort_key):
              return fetch_betterstack('Talenscio Platform', '3860580', sort_key)

          # ── Load previous status.json for change detection ─────────────────
          try:
              with open('status.json', 'r') as f:
                  prev_data = json.load(f)
              prev_status = {s['service']: s['status'] for s in prev_data.get('services', [])}
          except Exception:
              prev_status = {}

          # ── Poll all services ─────────────────────────────────────────────
          results.append(fetch_talenscio_platform(1))
          results.append(fetch_sorryapp('ANS Hosting', 'https://489048dd.sorryapp.com/api/v1/status', 2))
          results.append(fetch_statuspage('Daily.co', 'https://status.daily.co/api/v2/status.json', 3))
          results.append(fetch_betterstack('TalkJS', '4301538', 4))
          results.append(fetch_statuspage('Mailgun / Sinch', 'https://status.mailgun.com/api/v2/status.json', 5))
          results.append(fetch_statuspage('Miro', 'https://status.miro.com/api/v2/status.json', 6))
          results.append(fetch_betterstack('Stripe', '4301545', 7))
          results.append(fetch_statuspage('TawkTo', 'https://status.tawk.to/api/v2/status.json', 8))

          # Sort by sortKey
          results.sort(key=lambda x: x['sortKey'])

          # Summary counts
          summary = {
              'operational': sum(1 for r in results if r['status'] == 'Operational'),
              'degraded': sum(1 for r in results if r['status'] == 'Degraded'),
              'incident': sum(1 for r in results if r['status'] == 'Incident'),
              'maintenance': sum(1 for r in results if r['status'] == 'Maintenance'),
              'unknown': sum(1 for r in results if r['status'] == 'Unknown'),
              'lastRefresh': now
          }

          output = {'services': results, 'summary': summary}

          with open('status.json', 'w') as f:
              json.dump(output, f, indent=2)

          print(f"Polled {len(results)} services at {now}")
          for r in results:
              print(f"  {r['service']}: {r['status']}")

          # ── Detect status changes for non-BetterStack services ─────────────
          # BetterStack already sends alerts for: Talenscio Platform, TalkJS, Stripe
          BETTERSTACK_MONITORED = {'Talenscio Platform', 'TalkJS', 'Stripe'}
          ALERT_STATUSES = {'Incident', 'Degraded', 'Maintenance'}

          changes = []
          for r in results:
              name = r['service']
              if name in BETTERSTACK_MONITORED:
                  continue
              new_status = r['status']
              old_status = prev_status.get(name, 'Unknown')
              if new_status == old_status:
                  continue
              # Determine alert type
              if new_status in ALERT_STATUSES:
                  alert_type = 'ALERT'
              elif new_status == 'Operational' and old_status in ALERT_STATUSES:
                  alert_type = 'RESOLVED'
              else:
                  continue
              changes.append({
                  'service': name,
                  'alert_type': alert_type,
                  'old_status': old_status,
                  'new_status': new_status,
                  'description': r['description'],
                  'latest_issue': r['latestIssue'],
              })
              print(f"  STATUS CHANGE: {name} {old_status} -> {new_status} ({alert_type})")

          # Write changes to file for next step
          with open('status_changes.json', 'w') as f:
              json.dump(changes, f)
          EOF

      - name: Commit status.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash || true
          git pull --rebase origin main
          git stash pop || true
          git add status.json
          git diff --staged --quiet || git commit -m "chore: update service status $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Send status change alerts
              if: always()
              env:
                MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
              run: |
                python3 << 'EOF'
                import json
                import urllib.request
                import urllib.parse
                import urllib.error
                import base64
                import os
      
                api_key = os.environ.get('MAILGUN_API_KEY', '').strip()
                domain = 'm.talenscio.com'
                from_address = 'Talenscio Service Monitor <alerts@m.talenscio.com>'
                to_address = 'support@talenscio.com'
      
                try:
                    with open('status_changes.json', 'r') as f:
                        changes = json.load(f)
                except Exception:
                    changes = []
      
                if not changes:
                    print('No status changes detected - no emails to send')
                    exit(0)
      
                for change in changes:
                    service = change['service']
                    alert_type = change['alert_type']
                    old_status = change['old_status']
                    new_status = change['new_status']
                    description = change['description']
                    latest_issue = change['latest_issue']
      
                    subject = f"{alert_type}: {service} is now {new_status}"
                    body = (
                        f"Service: {service}\n"
                        f"Status: {new_status} (was {old_status})\n"
                        f"Description: {description}\n"
                    )
                    if latest_issue and latest_issue != 'None':
                        body += f"Latest Issue: {latest_issue}\n"
      
                    data = urllib.parse.urlencode({
                        'from': from_address,
                        'to': to_address,
                        'subject': subject,
                        'text': body,
                    }).encode('utf-8')
      
                    url = f'https://api.eu.mailgun.net/v3/{domain}/messages'
                    req = urllib.request.Request(url, data=data, method='POST')
                    credentials = base64.b64encode(f'api:{api_key}'.encode('utf-8')).decode('utf-8')
                    req.add_header('Authorization', f'Basic {credentials}')
      
                    try:
                        with urllib.request.urlopen(req, timeout=15) as r:
                            response_body = r.read().decode('utf-8')
                            print(f"  Email sent: {subject}")
                            print(f"  Response: {response_body}")
                    except urllib.error.HTTPError as e:
                        error_body = e.read().decode('utf-8')
                        print(f"  Email failed for {service}: HTTP {e.code} {e.reason}")
                        print(f"  Error detail: {error_body}")
                    except Exception as e:
                        print(f"  Email failed for {service}: {e}")
                EOF
